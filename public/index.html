<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 id="dashboard-title">Home Dashboard</h1>
    <div id="calendar"></div>
    <div id="header-right">
      <div id="clock">
        <div id="time"></div>
        <div id="date"></div>
      </div>
      <div id="weather"></div>
    </div>
  </header>

  <main>
    <div class="widget" id="heating-widget">
      <div class="widget-header">
        <span class="widget-title">Heating &amp; Hot Water</span>
        <span class="widget-badge" id="heating-mode"></span>
      </div>
      <div class="widget-body" id="heating-body">
        <span class="widget-loading">Loading&hellip;</span>
      </div>
    </div>

    <div class="widget" id="electricity-widget">
      <div class="widget-header">
        <span class="widget-title">Electricity Price</span>
        <span class="widget-badge" id="electricity-badge">Agile</span>
      </div>
      <div class="widget-body" id="electricity-body">
        <span class="widget-loading">Loading&hellip;</span>
      </div>
      <div class="electricity-graph" id="electricity-graph"></div>
    </div>

    <div class="widget" id="gas-widget">
      <div class="widget-header">
        <span class="widget-title">Gas Price</span>
        <span class="widget-badge" id="gas-badge">Variable</span>
      </div>
      <div class="widget-body" id="gas-body">
        <span class="widget-loading">Loading&hellip;</span>
      </div>
    </div>

    <div class="widget" id="deco-widget">
      <div class="widget-header">
        <span class="widget-title">Network</span>
        <span class="widget-badge" id="deco-badge"></span>
      </div>
      <div class="widget-body" id="deco-body">
        <span class="widget-loading">Loading&hellip;</span>
      </div>
    </div>

    <div class="widget" id="myenergi-widget">
      <div class="widget-header">
        <span class="widget-title">myenergi</span>
        <span class="widget-badge" id="myenergi-badge"></span>
      </div>
      <div class="widget-body" id="myenergi-body">
        <span class="widget-loading">Loading&hellip;</span>
      </div>
    </div>

    <div class="widget" id="cctv-widget">
      <div class="widget-header">
        <span class="widget-title">CCTV</span>
        <span class="widget-badge" id="cctv-badge"></span>
      </div>
      <div class="widget-body" id="cctv-body">
        <span class="widget-loading">Loading&hellip;</span>
      </div>
    </div>

    <div class="widget" id="thermopro-widget">
      <div class="widget-header">
        <span class="widget-title">Indoor Climate</span>
        <span class="widget-badge" id="thermopro-badge"></span>
      </div>
      <div class="widget-body" id="thermopro-body">
        <span class="widget-loading">Loading&hellip;</span>
      </div>
    </div>

    <div class="widget" id="tapo-widget">
      <div class="widget-header">
        <span class="widget-title">Smart Plugs &amp; Lights</span>
        <span class="widget-badge" id="tapo-badge"></span>
      </div>
      <div class="widget-body" id="tapo-body">
        <span class="widget-loading">Loading&hellip;</span>
      </div>
    </div>
  </main>

  <footer>
    <span id="version-info"></span>
  </footer>

  <script src="dashboard.js"></script>
</body>
</html>
