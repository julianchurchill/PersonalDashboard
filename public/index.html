<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div id="clock">
      <div id="time"></div>
      <div id="date"></div>
    </div>
  </header>

  <main>
    <div class="widget" id="heating-widget">
      <div class="widget-header">
        <span class="widget-title">Heating &amp; Hot Water</span>
        <span class="widget-badge" id="heating-mode"></span>
      </div>
      <div class="widget-body" id="heating-body">
        <span class="widget-loading">Loading&hellip;</span>
      </div>
    </div>
  </main>

  <footer>
    <span id="version-info"></span>
  </footer>

  <script src="dashboard.js"></script>
</body>
</html>
